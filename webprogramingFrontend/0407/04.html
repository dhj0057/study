<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css-태그 선택자 사용법</title>
    <style>
        h1 {
            background-color: rgb(136, 66, 66);
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        h2 {
            background-color: #ffff;
            font-size: 20px;
            font-style: italic;
            margin-bottom: 10px;
            float: left;
        }   
        p {
            background-color: rgb(177, 7, 7);
            color: white;
        }  
        #p1 {
            color : greenyellow;
            background-color: seagreen;
        } 
        #header {
            background-color: lightgray;
            font-size: 48px;
            font-weight: bold;
            overflow: hidden;
            margin: 0 auto;
            float: left;
        }
    </style>
</head>
<body>
    <h1 id="header">한국폴리택대학</h1>
    <h2 id="h2">인공지능소프트웨어과</h2>
    <h1>웹프로그래밍기초</h1>
    <p>태그 선택자를 위한 문서입니다</p>
    <p>태그 선택자를 위한 문서입니다</p>
    <p id="p1">태그 선택자를 위한 문서입니다</p>
    <p>태그 선택자를 위한 문서입니다람쥐썬더</p>
</body>
</html>
