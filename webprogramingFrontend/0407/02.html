<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>"회원가입"</title>
</head>
<body>
    <form action="1.html" method="get">
        <fieldset>
        <table> 
    
            <legend>회원가입</legend>
            <tr>
                <td><label for="name">성명:</label></td>
                <td><input type="text" name="name"></td>
            </tr>
            <tr>
                <td><label for="email">이메일:</label></td>
                <td><input type="email" name="email"></td>
            </tr>
            <tr>
                <td><label for="address">주소:</label></td>
                <td><input type="text" name="address"></td>
            </tr>
            <tr>
                <td><label for="gender">성별:</label></td>
                <td><input type="radio" name="gender" value="남성" id="male">
                    <label for="male">남성</label> &nbsp;&nbsp;
                    <input type="radio" name="gender" value="여성" id="female">
                    <label for="female">여성</label></td>
            </tr>
            <tr>
                <td><label for="hobby1">취미:</label></td>
                <td><input type="checkbox" name="hobby1" value="운동" id="hobby1">
                    <label for="hobby1">운동</label> &nbsp;&nbsp;
                    <input type="checkbox" name="hobby2" value="독서" id="hobby2">
                    <label for="hobby2">독서</label> &nbsp;&nbsp;
                    <input type="checkbox" name="hobby3" value="영화감상" id="hobby3">
                    <label for="hobby3">영화감상</label></td>
            </tr>
            <tr>    
                <td>남기고 싶은 말:</td>
                <td>
                    <textarea name="message" rows="5" cols="30">기타 하고 싶은 말이 있으면 여기에 입력하세요.</textarea>
                </td>
            </tr>
            <tr>
                 <td colspan="2" allign="center">
                    <input type="submit" value="가입하기">
                    <input type="reset" value="입력초기화">
                </td>
            </tr>
        
        
        
        
        
        </table>
        </fieldset>
    </form>
      

</body>
</html></html>
