<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선택자 연습</title>
    <style>
        #header {
            background-color: lightgray;
            font-size: 48px;
            font-weight: bold;
            margin: 0 auto;
            float: right;
        }
        #wrap {
            background-color: rgb(136, 66, 66);
            font-size: 20px;
            font-style: italic;
            margin-bottom: 50px;
            float: left;
        }
        #aside {
            background-color: rgb(177, 7, 7);
            color: white;
            font-size: 20px;
            font-style: italic;
            margin-bottom: 20px;
            float: left;
        }
        #content {
            background-color: seagreen;
            color: white;
        }
    </style>
</head>
<body>
    <div id="header">   
        <h1>한국폴리텍대학</h1>     
    </div>
    <div id="wrap">   
        <div id="aside">
            <h2>인공지능소프트웨어과</h2>
        </div>
    </div>
    <div id="content">
        <h1>웹프로그래밍기초</h1>
        <p>선택자 연습을 위한 문서입니다</p>  
    </div>
    <div id="header">
        <p>선택자 연습을 위한 문서입니다</p>    
</body>
</html>
