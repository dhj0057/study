<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>display속성</title>
    <style>

    
        #box {
            display:inline-block;  /* inline:margin은 좌우,너비와 높이 적용 안됨 || inline-block:margin은 좌우,너비와 높이 적용됨 || block:margin은 상하좌우,너비와 높이 적용됨 */
            width: 200px;
            height: 100px;
            background-color: lightblue;
        }
    </style>
</head>
<body>
    <p> dis play 속성의값 중에서</p>
    <span>inline 요소</span>
    <div id="box">block 요소</div>
    <span>inline 요소</span>
    <p> dis play 속성의값 중에서</p>
</body>
</html>
