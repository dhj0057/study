<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .first
        {
            color:blue;
            font-size:32px;
            font-style:italic;
        }
        .second
        {
            color:green;
            font-size:2em;
            font-style:bold;
        }
        .third
        {
            color:purple;
            font-size:large;
            font-weight:bold;
        }
        .fourth
        {
            color:orange;
            font-size:small;
            font-family:'Times New Roman', Times, serif;

        }

    </style>
</head>
<body>
    <p class="second">background-image 속성은 요소의 배경에 이미지를 설정하는 속성입니다. 여러 개의 이미지를 설정할 수 있으며, 각 이미지는 쉼표로 구분됩니다.</p>
    <p class="first">background-size 속성은 배경 이미지의 크기를 설정하는 속성 반복, repeat-y세로로만 택할 수 있습니다.</p>
    <p class="fourth">background-repeat 속성은 Times New Roman 글꼴을 사용하는 배경 이미지의 반복 여부를 설정하는 속성입니다.</p> 
    <p class="third">background-repeat 속성은 배경 이미지의 반복 여부를 설정하는 속성입니다.</p>  

</body>
</html>
