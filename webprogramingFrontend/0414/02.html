<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구조 선택자</title>
    <style>
        ul {
            overflow: hidden;
        }

        li {
            list-style: none;
            float: left;
            width: 100px;
            padding: 15px;
            color: #ffffff;
            font-weight: bold;
        }

        /* :first-child, :last-child, :nth-child(n) */
        li:first-child {
            border-radius: 10px 0 0 10px;
            background-color: rgb(212, 83, 24);
        }

        li:last-child {
            border-radius: 0 10px 10px 0;
            background-color: rgb(28, 141, 216);
        }

        li:nth-child(2) {

            background-color: rgb(37, 148, 27);
        }

        li:nth-child(3) {

            background-color: rgb(36, 23, 95);
        }

        li:nth-child(4) {

            background-color: rgb(172, 166, 197);
        }

        li:nth-child(5) {

            background-color: rgb(197, 126, 126);
        }

        li:nth-child(6) {

            background-color: rgb(255, 0, 255);
        }

        li:nth-child(7) {

            background-color: rgb(133, 20, 20);
        }
    </style>
</head>

<body>
    <ul>
        <li>첫 번째 자식 요소</li>
        <li>두 번째 자식 요소</li>
        <li>세 번째 자식 요소</li>
        <li>네 번째 자식 요소</li>
        <li>다섯 번째 자식 요소</li>
        <li>여섯 번째 자식 요소</li>
        <li>일곱 번째 자식 요소</li>
        <li>여덟 번째 자식 요소</li>
    </ul>
</body>

</html>
