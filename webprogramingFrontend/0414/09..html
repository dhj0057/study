<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박스 속성</title>
    <style>
       .div1 {
            width: 300px;
            height: 300px;
            background-color: rgb(38, 161, 177);
            border: 10px solid rgb(18, 18, 104);
            color: white;            
            text-align: center;
            line-height: 300px;
            margin: 50px 50px 0 50px;   
            padding: 0 50px 0 50px;

            text-align: center;
            line-height: 300px;

        }
        .div2 {
            width: 300px;
            height: 300px;
            background-color: rgb(159, 20, 214);
            border: thin dashed rgb(87, 87, 129);
            color: rgb(206, 149, 149);            
            text-align: center;
            line-height: 300px;
            margin: 50px 50px 0 50px;   
            padding: 0 50px 0 50px;

            text-align: center;
            line-height: 300px;

        }
         .div3 {
            width: 300px;
            height: 300px;
            background-color: rgb(179, 15, 138);
            border: thick dotted rgb(43, 240, 36);
            color: white;            
            text-align: center;
            line-height: 300px;
            margin: 50px 50px 0 50px;   
            padding: 0 50px 0 50px;

            text-align: center;
            line-height: 300px;

        }
    </style>
</head>
<body>
    <div class="div1">박스 속성과 값을 설정 방법</div>
    <div class="div2">박스 속성과 값을 설정 방법</div>
    <div class="div3">박스 속성과 값을 설정 방법</div>
</body>
</html>
